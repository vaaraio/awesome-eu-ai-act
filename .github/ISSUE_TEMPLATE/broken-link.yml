name: Broken link
description: Report a link that is no longer working
title: "Broken link: "
labels: ["bug"]
body:
  - type: input
    id: resource
    attributes:
      label: Resource name
      placeholder: e.g. EU AI Act Compliance Checker (FLI)
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Broken URL
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: replacement
    attributes:
      label: Replacement URL (if known)
      placeholder: https://...

  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: Any additional context (e.g. page redirects to homepage, resource was discontinued, etc.)
